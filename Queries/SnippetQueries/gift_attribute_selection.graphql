query($productId: Long!, $selections: [AttributeFilterInput]) {
  product(productId: $productId) {
    productId
    productVariantId
    attributeSelections(selected: $selections) {
      selectedVariant {
        productVariantId
      }
      selections {
        attributeId
        displayType
        name
        varyByParent
        values {
          alias
          available
          printUrl
          selected
          value
        }
      }
    }
  }
}

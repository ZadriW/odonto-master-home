query ProductPage($productId: Long!, $selections: [AttributeFilterInput], $partnerAccessToken: String){
  product(productId:$productId, partnerAccessToken: $partnerAccessToken) {
    buyTogether{
      productId
    }
    ...SingleProductData    
    id
    sku
    ean
    averageRating
    productBrand {
      name
      logoUrl
      fullUrlLogo
      alias
    }  
    informations{
      id
      title
      type
      value
    }
    reviews {
      customer
      email
      rating
      review
      reviewDate
    }
    promotions{
      content
      id
      stamp
      fullStampUrl
      title
      disclosureType
    }
    breadcrumbs{
      link
      text
    }
    seo {
      content
      name
      type
      httpEquiv
      scheme
    }
    addToCartFromSpot
    subscriptionGroups{
      recurringTypes{
        name
        days
        recurringTypeId
      }
      subscriptionGroupId
      subscriptionOnly
    }
  }
  productRecommendations(productId:$productId, partnerAccessToken: $partnerAccessToken) {
    alias: aliasComplete
    productName
    productId
    productVariantId
    available
    similarProducts{
      alias
      image
      name
      imageUrl(w: 50, h: 50)
    }
    images{
      url
    }
    prices {
      ...ProductPagePricesCore
    }
    promotions{
      content
      id
      stamp
      title
      disclosureType
    }
    informations{
      id
      title
      type
      value
    }
    addToCartFromSpot
  }
}

# Preço à vista, parcelamento e bestInstallment (melhor opção / menor parcela conforme API Wake)
fragment ProductPagePricesCore on Prices {
  listPrice
  price
  discountPercentage
  installmentPlans {
    displayName
    name
    installments {
      discount
      fees
      number
      value
    }
  }
  bestInstallment {
    name
    displayName
    discount
    fees
    number
    value
  }
}

fragment SingleProductData on SingleProduct {
  attributeSelections (selected: $selections) {
    canBeMatrix
    matrix {
      row {
        name
        displayType
        values {
          value
          printUrl
        }
      }
      column {
        name
        displayType
        values {
          value
          printUrl
        }
      }
      data {
        productVariantId
        available
        stock
      }
    }
    selectedVariant{
      id
      sku
      alias
      available
      images {
        fileName
        url
      }
      prices {
        ...ProductPagePricesCore
        wholesalePrices {
          price
          quantity
        }
      }
      productId
      productVariantId
      stock
    }
    selections{
      attributeId
      displayType
      name
      varyByParent
      values{
        alias
        available
        printUrl
        selected
        value
      }
    }
  }
  productId
  productName
  productVariantId
  stock
  available
  parallelOptions
  images {
    url
    fileName
    print
  }
  prices {
    ...ProductPagePricesCore
    wholesalePrices {
      price
      quantity
    }
  }
  productCategories {
    name
  }
  customizations {
    required
    customizationId
    cost
    name
    type
    values
  }
}

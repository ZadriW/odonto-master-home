query Account($customerAccessToken: String!, $hasCustomerAccessToken: Boolean!) {
  customer(customerAccessToken: $customerAccessToken) @include(if: $hasCustomerAccessToken) {
    customerId
    customerName
    customerType
    email
    addresses {
      id
      name
      addressDetails
      address
      addressNumber
      neighborhood
      city
      state
      cep
    }
  }
  customerAccessTokenDetails(customerAccessToken:$customerAccessToken) {
    type
  }
}

query Account($customerAccessToken: String!, $hasCustomerAccessToken: Boolean!) {
  customer(customerAccessToken: $customerAccessToken) @include(if: $hasCustomerAccessToken) {
    customerId
    customerName
    customerType
    companyName    
    email
    gender
    cpf
    cnpj
    stateRegistration
    rg
    phoneNumber
    mobilePhoneNumber
    businessPhoneNumber
    birthDate
    newsletter
  }

  customerAccessTokenDetails(customerAccessToken:$customerAccessToken) {
    type
    accessKey
  }

  changeEmailWithAccessKey: shopSetting(settingName: "AlterarEmailChaveAcesso"){
    value
  }
}
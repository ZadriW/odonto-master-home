<title>{{title}}</title>
{{~ capture favicon_source ~}}

{{~ end ~}}

<link rel="shortcut icon" type="image/x-icon" href="{{ favicon_source }}">

<!-- Flaticon Icons -->
<link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.0.0/uicons-solid-straight/css/uicons-solid-straight.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<!-- Google Fonts - Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

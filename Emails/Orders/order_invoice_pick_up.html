<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <table role="Newsletter" aria-label="Odonto Master" lang="pt-BR" dir="ltr" border="0" width="100%" cellpadding="0" cellspacing="0" style="font-size:medium;font-size:max(16px,1rem);font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;">
        <tbody>
            <tr>
                <td align="center" valign="top" style="background-color: #f8f9fa; padding: 20px 0;">
                    <div style="max-width:620px;margin-top:0;margin-bottom:0;margin-right:auto;margin-left:auto;background-color: #ffffff;border-radius: 8px;overflow: hidden;box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                        <!-- HEADER -->
                        {{header_mail}}
                        <!-- END HEADER -->

                        <!-- MAIN -->
                        <table border="0" width="620" cellpadding="0" cellspacing="0" style="width:620px;max-width:620px;margin: 0;padding: 40px 30px;">
                            <tbody>
                                <tr align="center">
                                    <td style="padding-bottom: 30px;">
                                        <h1 style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; font-size: 32px; line-height: 1.2; color: #0e167a; font-weight: 700; margin: 0;">Pedido Faturado - Retirada em Loja</h1>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 0 20px 20px 20px;">
                                        <p style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; font-size: 16px; line-height: 1.6; color: #374151; margin: 0 0 20px 0;">Olá, <strong style="color: #0e167a;">{{pedido.usuario.nome}}</strong></p>
                                        <p style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; font-size: 16px; line-height: 1.6; color: #374151; margin: 0 0 12px 0; font-weight: 600;">Dados da loja:</p>
                                        <table style="width: 100%;">
                                            <tbody>
                                                <tr>
                                                    <td style="padding: 4px 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; font-size: 14px; color: #6c757d;"><strong style="color: #0e167a;">Loja:</strong></td>
                                                    <td style="padding: 4px 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; font-size: 14px; color: #374151; font-weight: 500;">{{loja.nome}}</td>
                                                </tr>
                                                <tr>
                                                    <td style="padding: 4px 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; font-size: 14px; color: #6c757d;"><strong style="color: #0e167a;">Endereço:</strong></td>
                                                    <td style="padding: 4px 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; font-size: 14px; color: #374151; font-weight: 500;">{{loja.endereco}}</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <table border="0" width="620" cellpadding="0" cellspacing="0" style="padding: 0 30px;">
                            <tbody>
                                <tr>
                                    <td style="padding: 0 20px 20px 20px;">
                                        <h2 style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; font-size: 24px; line-height: 1.2; color: #0e167a; font-weight: 700; margin: 0;">Produtos comprados:</h2>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 0 20px;">
                                        <ul style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; font-size: 14px; line-height: 1.8; color: #374151; margin: 0 0 0 20px; padding: 0;">
                                            {{ for p in pedido.produtos }}
                                            <li style="margin-bottom: 8px;">{{ p.nome }}</li>
                                            {{ end }}
                                        </ul>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <!-- END MAIN -->

                        <!-- FOOTER -->
                        {{footer_mail}}
                        <!-- END FOOTER -->
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</body>
